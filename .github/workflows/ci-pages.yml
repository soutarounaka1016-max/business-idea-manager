name: Test and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run test:e2e
      - name: Upload Playwright report and failure evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify published URL
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error --location "$URL" >/dev/null; then
              echo "Verified: $URL"
              exit 0
            fi
            sleep 10
          done
          exit 1

  report:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, deploy]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Record Pages result on the commit
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_RESULT: ${{ needs.test.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          if [ "$TEST_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            state="success"
            description="Tests, browser checks, deployment, and URL verification passed"
          else
            state="failure"
            description="Test or GitHub Pages deployment failed"
          fi
          jq -n \
            --arg state "$state" \
            --arg target_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg description "$description" \
            --arg context "business-idea-manager/pages-deploy" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}' > status.json
          curl --fail --silent --show-error --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
